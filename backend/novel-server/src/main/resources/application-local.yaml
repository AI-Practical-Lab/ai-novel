server:
  port: 48080

--- #################### Database Related Configuration ####################
spring:
  # Data source configuration
  datasource:
    druid: # Druid [Monitoring] related global configuration
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        allow: # Set whitelist, allow all access if empty
        url-pattern: /druid/*
        login-username: # Console management username and password
        login-password:
      filter:
        stat:
          enabled: true
          log-slow-sql: true # Slow SQL logging
          slow-sql-millis: 100
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic: # Multi-data source configuration
      druid: # Druid [Connection Pool] related global configuration
        initial-size: 1 # Initial connection count
        min-idle: 1 # Minimum connection pool size
        max-active: 20 # Maximum connection pool size
        max-wait: 60000 # Connection acquisition timeout in milliseconds (1 minute)
        time-between-eviction-runs-millis: 60000 # Time between idle connection eviction checks in milliseconds (1 minute)
        min-evictable-idle-time-millis: 600000 # Minimum connection idle time in milliseconds (10 minutes)
        max-evictable-idle-time-millis: 1800000 # Maximum connection idle time in milliseconds (30 minutes)
        validation-query: SELECT 1 FROM DUAL # Query to validate connection validity
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true # Whether to enable PreparedStatement caching
        max-pool-prepared-statement-per-connection-size: 20 # Number of PreparedStatements cached per connection
      primary: master
      datasource:
        master:
          url: jdbc:mysql://localhost:13307/ai-novel?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true # Example MySQL Connector/J 8.X connection
          username: root
          password: 123456!@

# Log file configuration
logging:
  file:
    name: ${user.home}/logs/${spring.application.name}.log # Log file name with full path
  level:
    # Configure logging for custom MyBatis Mappers
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR

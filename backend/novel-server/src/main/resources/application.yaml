spring:
  application:
    name: yudao-server
  profiles:
    active: local
  main:
    allow-circular-references: true # Allow circular references as the project uses a three-tier architecture which makes this unavoidable
  # Servlet configuration
  servlet:
    # File upload related configuration
    multipart:
      max-file-size: 16MB # Maximum size of a single file
      max-request-size: 32MB # Maximum total size of uploaded files
  # Jackson configuration
  jackson:
    serialization:
      write-dates-as-timestamps: true # Format dates as timestamps
      write-date-timestamps-as-nanoseconds: false # Do not use nanoseconds format (e.g., use 1611460870401 instead of 1611460870.401)
      write-durations-as-timestamps: true # Format durations as timestamps
      fail-on-empty-beans: false # Allow serialization of beans with no properties

server:
  servlet:
    encoding:
      enabled: true
      charset: UTF-8 # Must set to UTF-8 to avoid garbled characters in WebFlux streaming responses (AI scenarios)
      force: true

knife4j:
  enable: true
  setting:
    language: zh_cn
# MyBatis Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # Although default is true, explicitly specify it
  global-config:
    db-config:
      id-type: NONE # "Smart" mode, automatically adapts to AUTO or INPUT based on data source type via IdTypeEnvironmentPostProcessor
#      id-type: AUTO # Auto-increment ID, suitable for MySQL and other databases with direct auto-increment
#      id-type: INPUT # User-provided ID, suitable for Oracle, PostgreSQL, Kingbase, DB2, H2
#      id-type: ASSIGN_ID # Assigned ID, uses snowflake algorithm by default. Note: Remove @KeySequence annotation from entity classes for Oracle, PostgreSQL, Kingbase, DB2, H2
      logic-delete-value: 1 # Logic deleted value (default is 1)
      logic-not-delete-value: 0 # Logic not deleted value (default is 0)
    banner: false # Disable console banner printing
  type-aliases-package: ${yudao.info.base-package}.module.*.dal.dataobject
  encryptor:
    password: XDV71a+xqStEA3WH # Encryption/decryption key, can be generated at https://www.imaegoo.com/2020/aes-key-generator/

mybatis-plus-join:
  banner: false # Whether to print mybatis plus join banner, default true
  sub-table-logic: true # Globally enable sub-table logic deletion, default true. When disabled, associated queries won't include sub-table logic deletion conditions
  ms-cache: true # Interceptor MappedStatement cache, default true
  table-alias: t # Table alias (default t)
  logic-del-type: on # Position of sub-table logic deletion condition, supports WHERE or ON, default ON

# VO conversion (data translation) configuration
easy-trans:
  is-enable-global: false # [Disabled by default due to performance concerns] Enable global translation (automatically translate all SpringMVC ResponseBody). Disable for high performance requirements or use @IgnoreTrans to skip specific interfaces

